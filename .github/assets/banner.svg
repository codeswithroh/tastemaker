<svg width="1280" height="420" viewBox="0 0 1280 420" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
  <rect width="1280" height="420" fill="#0C1414"/>
  <rect x="0.5" y="0.5" width="1279" height="419" stroke="#232B2C"/>

  <!-- left column -->
  <g>
    <!-- kicker: a short rule + label, matching the live site (no pill, no dot) -->
    <line x1="80" y1="92" x2="116" y2="92" stroke="#BE85CE" stroke-width="1"/>
    <text x="126" y="96" fill="#BE85CE" font-size="11" letter-spacing="1.6" font-weight="600">DESIGN TASTE FOR CODING AGENTS</text>

    <!-- mark: unchanged, per the brand-preservation rule -->
    <g transform="translate(80,140) scale(1.4)">
      <rect x="4" y="13" width="20" height="20" rx="5" fill="#065F46" stroke="#0C1414" stroke-width="2"/>
      <rect x="10" y="9" width="20" height="20" rx="5" fill="#047857" stroke="#0C1414" stroke-width="2"/>
      <rect x="16" y="5" width="20" height="20" rx="5" fill="#34D399" stroke="#0C1414" stroke-width="2"/>
    </g>
    <text x="146" y="185" fill="#E5F6F6" font-size="46" font-weight="800" letter-spacing="-1.3">tastemaker</text>

    <text x="80" y="240" fill="#E5F6F6" font-size="42" font-weight="800" letter-spacing="-1.2">Make your agent's UI</text>
    <text x="80" y="286" fill="#BE85CE" font-size="42" font-weight="800" letter-spacing="-1.2">worth shipping.</text>
    <text x="80" y="322" font-size="15.5" fill="#A8BABA">Tastemaker turns real references into a visual system your</text>
    <text x="80" y="343" font-size="15.5" fill="#A8BABA">coding agent can build with, and remember.</text>

    <!-- buttons, matching the live site's primary + bordered pair -->
    <rect x="80" y="366" width="176" height="38" rx="6" fill="#008286"/>
    <text x="98" y="390" fill="#FFFFFF" font-size="13.5" font-weight="700">Install Tastemaker  ↓</text>
    <rect x="266" y="366" width="122" height="38" rx="6" fill="none" stroke="#232B2C"/>
    <text x="284" y="390" fill="#E5F6F6" font-size="13.5" font-weight="700">See the proof</text>
  </g>

  <!-- right column: a small recreation of the live hero's real output preview (Solstice) -->
  <g transform="translate(700,60)">
    <ellipse cx="260" cy="316" rx="200" ry="14" fill="#000000" opacity="0.25"/>
    <rect x="0" y="0" width="500" height="300" fill="#171F1F" stroke="#232B2C" stroke-width="1"/>
    <text x="20" y="26" fill="#6B7A7A" font-size="10" letter-spacing="1">BUILT WITH TASTEMAKER</text>
    <circle cx="470" cy="21" r="3.5" fill="#BE85CE"/>
    <text x="452" y="46" fill="#7FB8BA" font-size="9" letter-spacing="0.6" text-anchor="end">STYLE LOCKED</text>

    <!-- the actual Solstice preview, simplified -->
    <rect x="20" y="56" width="460" height="224" fill="#F2EEE4" stroke="#D2CEC4" stroke-width="1"/>
    <line x1="20" y1="92" x2="480" y2="92" stroke="#D2CEC4" stroke-width="1"/>
    <path d="M40 66 L47 71 L44 79 L36 79 L33 71 Z" fill="#B54838"/>
    <text x="52" y="78" fill="#18211F" font-size="9" font-weight="700" letter-spacing="0.6">SOLSTICE</text>
    <text x="468" y="78" fill="#18211F" font-size="7.5" letter-spacing="0.5" text-anchor="end">THE ROASTS  ABOUT  CART 0</text>

    <text x="40" y="122" fill="#9C542F" font-size="8" font-weight="700" letter-spacing="1">SMALL-BATCH / WEEKLY</text>
    <text x="40" y="150" fill="#18211F" font-size="24" font-weight="800" letter-spacing="-0.8">Make room for</text>
    <text x="40" y="176" fill="#18211F" font-size="24" font-weight="800" letter-spacing="-0.8">a slower morning.</text>
    <text x="40" y="204" fill="#5D655F" font-size="9">One remarkable roast, delivered when it is ready.</text>
    <text x="40" y="230" fill="#B54838" font-size="9" font-weight="700">DISCOVER THIS WEEK'S ROAST →</text>

    <rect x="300" y="92" width="180" height="188" fill="#DFBB68"/>
    <ellipse cx="470" cy="130" rx="90" ry="24" fill="none" stroke="#18211F" stroke-width="2.4" transform="rotate(-16 470 130)"/>
    <path d="M330 140 Q330 220 390 220 Q410 220 410 195 Q410 175 385 175" fill="none" stroke="#18211F" stroke-width="3.4" stroke-linecap="round"/>
    <circle cx="450" cy="240" r="20" fill="#B54838" stroke="#18211F" stroke-width="2.4"/>
    <path d="M300 280 L332 235 L365 280 Z" fill="#253D34"/>
  </g>
</svg>
