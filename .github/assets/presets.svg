<svg width="1200" height="470" viewBox="0 0 1200 470" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
  <rect width="1200" height="470" rx="18" fill="#0B0D12" stroke="#1B2028"/>
  <text x="40" y="56" fill="#E6E6EA" font-size="22" font-weight="800">Five built-in presets</text>
  <text x="40" y="82" fill="#8A93A3" font-size="14">Each is a verified palette and Google Font pairing, chosen together and matched to your app idea.</text>

  <!-- column headers -->
  <text x="40" y="128" fill="#5B6472" font-size="11" letter-spacing="1">MOOD</text>
  <text x="360" y="128" fill="#5B6472" font-size="11" letter-spacing="1">PALETTE</text>
  <text x="720" y="128" fill="#5B6472" font-size="11" letter-spacing="1">TYPE PAIRING</text>

  <!-- rows -->
  <g font-size="15" font-weight="700" fill="#E6E6EA">
    <text x="40" y="176">Premium / confident</text>
    <text x="40" y="242">Warm / approachable</text>
    <text x="40" y="308">Technical / builder</text>
    <text x="40" y="374">Playful / consumer</text>
    <text x="40" y="440">Elegant / editorial</text>
  </g>

  <!-- swatch rows: helper is 5 rects each -->
  <!-- Premium -->
  <g transform="translate(360,156)"><rect width="44" height="26" rx="6" fill="#050315" stroke="#2A3038"/><rect x="54" width="44" height="26" rx="6" fill="#FBFBFE"/><rect x="108" width="44" height="26" rx="6" fill="#2F27CE"/><rect x="162" width="44" height="26" rx="6" fill="#DEDCFF"/><rect x="216" width="44" height="26" rx="6" fill="#433BFF"/></g>
  <!-- Warm -->
  <g transform="translate(360,222)"><rect width="44" height="26" rx="6" fill="#2B2118"/><rect x="54" width="44" height="26" rx="6" fill="#FBF7F0"/><rect x="108" width="44" height="26" rx="6" fill="#B85A38"/><rect x="162" width="44" height="26" rx="6" fill="#F0E4D3"/><rect x="216" width="44" height="26" rx="6" fill="#7A8C6E"/></g>
  <!-- Technical -->
  <g transform="translate(360,288)"><rect width="44" height="26" rx="6" fill="#E6E6EA"/><rect x="54" width="44" height="26" rx="6" fill="#0B0D12" stroke="#2A3038"/><rect x="108" width="44" height="26" rx="6" fill="#047857"/><rect x="162" width="44" height="26" rx="6" fill="#161A21" stroke="#2A3038"/><rect x="216" width="44" height="26" rx="6" fill="#34D399"/></g>
  <!-- Playful -->
  <g transform="translate(360,354)"><rect width="44" height="26" rx="6" fill="#14042B"/><rect x="54" width="44" height="26" rx="6" fill="#FFFFFF"/><rect x="108" width="44" height="26" rx="6" fill="#4361EE"/><rect x="162" width="44" height="26" rx="6" fill="#7209B7"/><rect x="216" width="44" height="26" rx="6" fill="#F72585"/></g>
  <!-- Elegant -->
  <g transform="translate(360,420)"><rect width="44" height="26" rx="6" fill="#211F1C"/><rect x="54" width="44" height="26" rx="6" fill="#F7F4EE"/><rect x="108" width="44" height="26" rx="6" fill="#2F2A24"/><rect x="162" width="44" height="26" rx="6" fill="#E8E1D3"/><rect x="216" width="44" height="26" rx="6" fill="#B5762C"/></g>

  <!-- type pairings -->
  <g font-size="14" fill="#A6ADBB">
    <text x="720" y="176">Unbounded + Albert Sans</text>
    <text x="720" y="242">Zain + Nunito</text>
    <text x="720" y="308">Archivo + IBM Plex Mono</text>
    <text x="720" y="374">Urbanist + Open Sans</text>
    <text x="720" y="440">Gloock + Inter</text>
  </g>
</svg>
